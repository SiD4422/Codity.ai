services:
  - type: web
    name: job-scheduler-api
    runtime: node
    plan: free
    rootDir: job-scheduler/backend
    buildCommand: npm install
    startCommand: npm run migrate && node src/start-all.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-scheduler-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false   # set this to your Netlify URL after first deploy
      - key: PROJECT_ID
        sync: false   # set this after creating a project through the deployed API
      - key: MAX_CONCURRENCY
        value: 5
      - key: STALE_HEARTBEAT_MS
        value: 15000

databases:
  - name: job-scheduler-db
    plan: free
